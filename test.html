<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dorsetest</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%23000' class='size-6'><path stroke-linecap='round' stroke-linejoin='round' d='M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5' /></svg>">

<style>
    body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .bar-container {
        display: flex;
        height: 20px;
        border-radius: 10px;
        overflow: hidden;
        margin: 0 0 20px 0;
    }
    .bar-labels {
        display: flex;
        justify-content: space-between;
        margin: 30px 10px 10px 10px;
        font-size: 15px;
        font-weight: bold;
        ::first-letter {
            text-transform: uppercase;
        }
    }
    .bar-v1 {
        background: lime;
    }
    .bar-v2 {
        background: deepskyblue;
    }
    .bar-draw {
        background: silver;
    }
    .bar-v1, .bar-v2, .bar-draw {
        display: flex;
        align-items: center;
        justify-content: center;
        color: dimgray;
        font-size: 15px;
        white-space: nowrap;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    td, th {
        text-align: left;
        padding: 6px 10px;
        border-bottom: 1px solid #ddd;
    }
</style>
</head>
<body>

<h2>Dorsetest Results</h2>
<p id="meta"></p>

<div class="bar-labels">
    <span class="v1-label" id="v1-name">v1</span>
    <span class="draw-label">draw</span>
    <span class="v2-label" id="v2-name">v2</span>
</div>
<div class="bar-container" id="bar"></div>

<table>
    <tr><th>Engine</th><th>Wins</th><th>Win %</th></tr>
    <tbody id="summary-table"></tbody>
</table>

<h3 style="margin-top: 35px">Games</h3>
<table>
    <tr><th>#</th><th>White</th><th>Black</th><th>Result</th><th>Moves</th></tr>
    <tbody id="games-table"></tbody>
</table>

<!-- DORSE_RESULTS_START -->
<script>
const results = {"timestamp": "2026-06-30-140823", "engines": {"v1": "v1", "v2": "v2"}, "movetime": 100, "games": [{"result": "draw", "moves": 200, "white": "v1", "black": "v2", "fen": "r1bq1rk1/pppp1ppp/2nb1n2/4p3/B3P3/2N2N2/PPPP1PPP/R1BQK2R w KQ - 0 6"}, {"result": "v1", "moves": 50, "white": "v2", "black": "v1", "fen": "r1bq1rk1/pppp1ppp/2nb1n2/4p3/B3P3/2N2N2/PPPP1PPP/R1BQK2R w KQ - 0 6"}, {"result": "v1", "moves": 127, "white": "v1", "black": "v2", "fen": "r1bqk2r/1ppp1ppp/p1n2n2/2b1p3/4P3/2NP1N2/PPP1BPPP/R1BQK2R w KQkq - 0 6"}, {"result": "v2", "moves": 133, "white": "v2", "black": "v1", "fen": "r1bqk2r/1ppp1ppp/p1n2n2/2b1p3/4P3/2NP1N2/PPP1BPPP/R1BQK2R w KQkq - 0 6"}, {"result": "v1", "moves": 75, "white": "v1", "black": "v2", "fen": "r1bqk2r/ppp2ppp/2np1n2/2b1p3/P3P3/2N2N1P/1PPP1PP1/R1BQKB1R w KQkq - 0 6"}, {"result": "v2", "moves": 41, "white": "v2", "black": "v1", "fen": "r1bqk2r/ppp2ppp/2np1n2/2b1p3/P3P3/2N2N1P/1PPP1PP1/R1BQKB1R w KQkq - 0 6"}, {"result": "v1", "moves": 39, "white": "v1", "black": "v2", "fen": "r1b1k2r/ppppqppp/2n2n2/2b1p3/4P3/2NP1N1P/PPP2PP1/R1BQKB1R w KQkq - 0 6"}, {"result": "v2", "moves": 39, "white": "v2", "black": "v1", "fen": "r1b1k2r/ppppqppp/2n2n2/2b1p3/4P3/2NP1N1P/PPP2PP1/R1BQKB1R w KQkq - 0 6"}, {"result": "v2", "moves": 94, "white": "v1", "black": "v2", "fen": "r1bqkb1r/1ppp1p1p/2n2np1/p3p3/4P3/2NB1N1P/PPPP1PP1/R1BQK2R w KQkq - 0 6"}, {"result": "v2", "moves": 119, "white": "v2", "black": "v1", "fen": "r1bqkb1r/1ppp1p1p/2n2np1/p3p3/4P3/2NB1N1P/PPPP1PP1/R1BQK2R w KQkq - 0 6"}, {"result": "v2", "moves": 32, "white": "v1", "black": "v2", "fen": "r1bqk2r/pppp1ppp/2n5/4p3/PbB1n3/2N2N2/1PPP1PPP/R1BQK2R w KQkq - 0 6"}, {"result": "draw", "moves": 200, "white": "v2", "black": "v1", "fen": "r1bqk2r/pppp1ppp/2n5/4p3/PbB1n3/2N2N2/1PPP1PPP/R1BQK2R w KQkq - 0 6"}, {"result": "v2", "moves": 148, "white": "v1", "black": "v2", "fen": "r1bqkb1r/1ppp1pp1/p1n2n1p/4p3/P3P3/2NP1N2/1PP2PPP/R1BQKB1R w KQkq - 0 6"}, {"result": "v2", "moves": 187, "white": "v2", "black": "v1", "fen": "r1bqkb1r/1ppp1pp1/p1n2n1p/4p3/P3P3/2NP1N2/1PP2PPP/R1BQKB1R w KQkq - 0 6"}, {"result": "v2", "moves": 22, "white": "v1", "black": "v2", "fen": "r1bqk2r/pppp1pbp/2n2np1/4p3/4P3/2N2NP1/PPPP1P1P/1RBQKB1R w Kkq - 0 6"}, {"result": "v1", "moves": 22, "white": "v2", "black": "v1", "fen": "r1bqk2r/pppp1pbp/2n2np1/4p3/4P3/2N2NP1/PPPP1P1P/1RBQKB1R w Kkq - 0 6"}, {"result": "v2", "moves": 166, "white": "v1", "black": "v2", "fen": "r1bqk2r/pppp1ppp/1bn2n2/4p3/2B1P3/2N2N2/PPPP1PPP/1RBQK2R w Kkq - 0 6"}, {"result": "v2", "moves": 49, "white": "v2", "black": "v1", "fen": "r1bqk2r/pppp1ppp/1bn2n2/4p3/2B1P3/2N2N2/PPPP1PPP/1RBQK2R w Kkq - 0 6"}, {"result": "v1", "moves": 125, "white": "v1", "black": "v2", "fen": "r1bqk2r/pppp1ppp/2n2n2/4p3/Nb2P3/3P1N2/PPP2PPP/R1BQKB1R w KQkq - 0 6"}, {"result": "draw", "moves": 200, "white": "v2", "black": "v1", "fen": "r1bqk2r/pppp1ppp/2n2n2/4p3/Nb2P3/3P1N2/PPP2PPP/R1BQKB1R w KQkq - 0 6"}], "summary": {"v1": 6, "v2": 11, "draw": 3}};
</script>
<!-- DORSE_RESULTS_END -->

<script>
document.getElementById("meta").innerHTML =
    `Date: ${results.timestamp}<br><br>Movetime:${results.movetime}ms`;

const s = results.summary;
const total = s.v1 + s.v2 + s.draw;

document.getElementById("v1-name").textContent = results.engines.v1;
document.getElementById("v2-name").textContent = results.engines.v2;

const bar = document.getElementById("bar");
bar.innerHTML = `
    <div class="bar-v1" style="width:${s.v1 / total * 100}%">${(s.v1 / total * 100).toFixed(0)}%</div>
    <div class="bar-draw" style="width:${s.draw / total * 100}%">${(s.draw / total * 100).toFixed(0)}%</div>
    <div class="bar-v2" style="width:${s.v2 / total * 100}%">${(s.v2 / total * 100).toFixed(0)}%</div>
`;

const summaryTable = document.getElementById("summary-table");
for (const [name, wins] of Object.entries(s)) {
    summaryTable.innerHTML += `<tr><td>${name}</td><td>${wins}</td><td>${(wins / total * 100).toFixed(1)}%</td></tr>`;
}

const gamesTable = document.getElementById("games-table");
results.games.forEach((g, i) => {
    gamesTable.innerHTML += `<tr><td>${i + 1}</td><td>${g.white}</td><td>${g.black}</td><td>${g.result}</td><td>${g.moves}</td></tr>`;
});
</script>

</body>
</html>
